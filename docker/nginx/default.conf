server {
    listen PORT_PLACEHOLDER;
    listen [::]:PORT_PLACEHOLDER;
    server_name _;
    
    # IMPORTANTE: Apuntamos a la carpeta public, no a la raíz del proyecto
    root /var/www/public;
    
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    
    index index.php;
    
    charset utf-8;
    
    # Esta es la regla mágica de las "URLs Bonitas" de Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    
    error_page 404 /index.php;
    
    # Aquí es donde Nginx le pasa el pedido al Chef (PHP-FPM)
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }
    
    # Bloqueamos el acceso a archivos ocultos (como .env o .git)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
